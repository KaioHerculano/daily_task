name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Lint & Tests
    runs-on: ubuntu-latest

    # Sobe serviços temporários para os testes precisarem de banco de dados e mensageria
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: daily_task_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Configura as variáveis de ambiente necessárias para o settings.py rodar nos testes
    env:
      SECRET_KEY: "secret-key-de-teste-para-o-github-actions"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_DB: daily_task_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar o Poetry e Dependências
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-root

      - name: Rodar Testes e Coverage
        run: make test-coverage
