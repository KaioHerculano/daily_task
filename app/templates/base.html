<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Study Task{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>

    <script>
        const resolveTheme = (theme) => {
            if (theme === 'auto') {
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            return theme;
        };

        window.studyTaskSetTheme = (theme) => {
            document.documentElement.setAttribute('data-bs-theme', resolveTheme(theme));
            localStorage.setItem('theme', theme);
        };

        const getPreferredTheme = () => {
            const storedTheme = localStorage.getItem('theme');
            if (storedTheme) {
                return storedTheme;
            }
            return 'light';
        };

        window.studyTaskSetTheme(getPreferredTheme());
    </script>

    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }

      [data-bs-theme="dark"] body,
      [data-bs-theme="dark"] .study-navbar,
      [data-bs-theme="dark"] .study-footer {
        background-color: #0f172a !important;
      }

      [data-bs-theme="dark"] .study-navbar,
      [data-bs-theme="dark"] .study-footer {
        border-color: #334155 !important;
      }

      [data-bs-theme="dark"] .study-navbar .btn-outline-secondary {
        --bs-btn-color: #94a3b8;
        --bs-btn-border-color: #475569;
        --bs-btn-hover-color: #e2e8f0;
        --bs-btn-hover-bg: #1e293b;
        --bs-btn-hover-border-color: #64748b;
        --bs-btn-active-bg: #1e293b;
        --bs-btn-active-border-color: #64748b;
      }
    </style>

    {% block styles %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        {% include 'components/_navbar.html' %}
    </header>

    <main class="container mt-4 mb-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="study-footer footer mt-auto py-3 bg-body-tertiary border-top">
        <div class="container text-center">
            <span class="text-body-secondary">© {% now "Y" %} Daily Task. Todos os direitos reservados.</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.studyTaskGetCookie = function (name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        };

        window.timerWidget = function (initialSeconds, initialStatus) {
            return {
                seconds: initialSeconds,
                status: initialStatus,
                loading: false,
                intervalId: null,
                objectiveAchieved: 'YES',
                objectiveResult: '',
                learningNote: '',
                nextStep: '',

                init() {
                    if (this.status === 'IN_PROGRESS') {
                        this.startTick();
                    }
                },

                startTick() {
                    this.intervalId = setInterval(() => {
                        this.seconds++;
                    }, 1000);
                },

                stopTick() {
                    if (this.intervalId) {
                        clearInterval(this.intervalId);
                        this.intervalId = null;
                    }
                },

                get formattedTime() {
                    const hrs = Math.floor(this.seconds / 3600);
                    const mins = Math.floor((this.seconds % 3600) / 60);
                    const secs = this.seconds % 60;
                    return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                },

                async sendAction(url, payload = {}) {
                    this.loading = true;
                    const formData = new FormData();
                    Object.entries(payload).forEach(([key, value]) => {
                        formData.append(key, value);
                    });
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'X-CSRFToken': window.studyTaskGetCookie('csrftoken')
                            },
                            body: formData
                        });
                        if (response.ok) {
                            htmx.ajax('GET', "{% url 'timer_widget' %}", {target: '#global-timer-container', swap: 'innerHTML'});
                        } else {
                            const data = await response.json();
                            alert(data.error || "Erro ao atualizar a sessão.");
                        }
                    } catch (error) {
                        console.error("Erro na comunicação com o backend:", error);
                    } finally {
                        this.loading = false;
                    }
                },

                pauseSession() {
                    this.stopTick();
                    this.sendAction("{% url 'pause_session' %}");
                },

                resumeSession() {
                    this.sendAction("{% url 'resume_session' %}");
                },

                stopSession() {
                    this.stopTick();
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('stopSessionModal')).show();
                },

                finishSession() {
                    this.stopTick();
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('stopSessionModal')).hide();
                    this.sendAction("{% url 'stop_session' %}", {
                        objective_achieved: this.objectiveAchieved,
                        objective_result: this.objectiveResult,
                        learning_note: this.learningNote,
                        next_step: this.nextStep
                    });
                }
            };
        };

        document.body.addEventListener('htmx:afterSwap', function (event) {
            if (window.Alpine) {
                window.Alpine.initTree(event.detail.target);
            }
        });
    </script>
    {% block scripts %}{% endblock %}

    {% if user.is_authenticated %}
        <div id="global-timer-container" hx-get="{% url 'timer_widget' %}" hx-trigger="load"></div>
    {% endif %}
</body>
</html>
