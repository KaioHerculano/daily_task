<nav class="study-navbar navbar bg-body border-bottom sticky-top shadow-sm">
  <div class="container d-flex flex-wrap align-items-center gap-2 py-2">
    <a class="navbar-brand fw-semibold d-flex align-items-center gap-2 me-auto" href="{% url 'dashboard' %}">
      <i class="bi bi-graph-up-arrow text-primary"></i>
      <span>Daily Task</span>
    </a>

    <a class="btn btn-sm btn-outline-secondary d-none d-sm-inline-flex align-items-center gap-2" href="{% url 'dashboard' %}">
      <i class="bi bi-grid"></i>
      <span>Dashboard</span>
    </a>

    <div class="dropdown">
      <button class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-2" id="bd-theme" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Alternar tema">
        <i class="bi bi-circle-half"></i>
        <span class="d-none d-md-inline">Tema</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-theme">
        <li>
          <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light">
            <i class="bi bi-sun-fill me-2"></i> Claro
          </button>
        </li>
        <li>
          <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark">
            <i class="bi bi-moon-stars-fill me-2"></i> Escuro
          </button>
        </li>
        <li>
          <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="auto">
            <i class="bi bi-circle-half me-2"></i> Automatico
          </button>
        </li>
      </ul>
    </div>

    {% if user.is_authenticated %}
      <a class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-2" href="{% url 'profile' %}">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-md-inline">{{ user.username }}</span>
      </a>
      <form action="{% url 'logout' %}" method="post" class="m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-2">
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-md-inline">Sair</span>
        </button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-sm btn-outline-secondary">Login</a>
      <a href="{% url 'register' %}" class="btn btn-sm btn-primary">Cadastrar</a>
    {% endif %}
  </div>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
      toggle.addEventListener('click', () => {
        window.studyTaskSetTheme(toggle.getAttribute('data-bs-theme-value'));
        window.dispatchEvent(new Event('study-task-theme-change'));
      });
    });
  });
</script>
